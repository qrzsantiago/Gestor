<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7A5CFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4C8DFF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.35" />
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0" />
    </linearGradient>
  </defs>
  
  <!-- Fondo redondeado estilo iOS -->
  <rect width="512" height="512" rx="115" fill="#0A0A0F"/>
  <rect x="56" y="56" width="400" height="400" rx="96" fill="url(#grad1)"/>
  <rect x="56" y="56" width="400" height="400" rx="96" fill="url(#grad2)"/>
  
  <!-- Gráfica de barras estilizada (representa análisis financiero) -->
  <!-- Barra 1 (pequeña) -->
  <rect x="140" y="280" width="35" height="80" rx="8" fill="#ffffff" opacity="0.85"/>
  
  <!-- Barra 2 (mediana) -->
  <rect x="198" y="240" width="35" height="120" rx="8" fill="#ffffff" opacity="0.9"/>
  
  <!-- Barra 3 (grande) -->
  <rect x="256" y="180" width="35" height="180" rx="8" fill="#ffffff" opacity="1"/>
  
  <!-- Barra 4 (mediana) -->
  <rect x="314" y="240" width="35" height="120" rx="8" fill="#ffffff" opacity="0.9"/>
  
  <!-- Línea base -->
  <line x1="130" y1="370" x2="380" y2="370" stroke="#ffffff" stroke-width="3" opacity="0.6" stroke-linecap="round"/>
  
  <!-- Pequeño símbolo de crecimiento (flecha ascendente) -->
  <path d="M 380 320 L 410 290 L 400 290 L 400 330 Z" fill="#34E0A1" opacity="0.9"/>
</svg>
